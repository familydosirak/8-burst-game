<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>8 Burst</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <h1 class="title">8 Burst</h1>

    <section class="stats">
      <div class="stat"><div class="stat-label">점수</div><div id="score" class="stat-value">0</div></div>
      <div class="stat"><div class="stat-label">콤보</div><div id="combo" class="stat-value">0</div></div>
      <div class="stat"><div class="stat-label">최고</div><div id="best" class="stat-value">0</div></div>
      <div class="stat"><div class="stat-label">턴</div><div id="turn" class="stat-value">0</div></div>
    </section>

    <section class="card">
      <div class="row">
        <span>과부하 <strong id="load">0</strong>/180</span>
        <span id="state" class="badge state-badge">READY</span>
      </div>
      <div class="meter"><div id="loadBar" class="meter-fill"></div></div>
      <p id="msg" aria-live="polite">원하는 방향을 누르고 있다가 힘을 맞춰 놓으세요.</p>
    </section>

    <div class="canvas-wrap">
      <canvas id="gameCanvas" width="680" height="700"></canvas>
    </div>

    <section class="card">
      <div class="row">
        <div class="power-area">
          <div class="power-label">
            <span>발사 힘</span>
            <strong id="powerText">대기</strong>
          </div>
          <div class="meter"><div id="powerBar" class="meter-fill"></div></div>
        </div>
        <button id="resetButton" class="button" type="button">다시 시작</button>
      </div>

      <div class="queue">
        <span class="muted">발사 준비</span>
        <span id="currentBall" class="badge">1</span>
        <span class="muted queue-label">다음</span>
        <span id="nextBalls" class="next-balls"></span>
      </div>

      <div class="pairs">
        <span class="badge pair-red">1 + 7</span>
        <span class="badge pair-yellow">2 + 6</span>
        <span class="badge pair-green">3 + 5</span>
        <span class="badge pair-blue">4 + 4</span>
      </div>

      <p class="help">
        발사 공의 위·옆·뒤쪽을 모두 눌러 조준할 수 있습니다. 누르는 동안 힘이 왕복하고,
        놓는 순간 현재 힘으로 발사됩니다. 공이 충분히 느려지면 빠르게 감속한 뒤 정지합니다.
      </p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
  <script src="./game.js"></script>
</body>
</html>
